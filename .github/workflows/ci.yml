name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  laravel:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, dom, fileinfo, pdo, pdo_mysql, bcmath, json, xml, curl
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Run PHPUnit tests
        if: github.ref_name != 'main'
        run: php artisan test

      - name: Run Laravel Pint
        run: vendor/bin/pint --test

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

  deploy:
    if: github.ref_name == 'main'
    needs: [laravel, frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, dom, fileinfo, pdo, pdo_mysql, bcmath, json, xml, curl
          coverage: none

      - name: Install composer dependencies (no dev)
        run: composer install --prefer-dist --no-interaction --no-progress --no-dev --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies and build
        run: |
          npm ci
          npm run build

      - name: Create production .env
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Prepare InfinityFree directory structure
        run: |
          mkdir -p deploy/laravel deploy/htdocs
          rsync -a --exclude='.git' --exclude='.github' --exclude='node_modules' \
            --exclude='tests' --exclude='deploy' --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/data/*' --exclude='.env' \
            . deploy/laravel/
          rsync -a public/ deploy/htdocs/

      - name: Write InfinityFree htdocs/index.php
        run: |
          cat > deploy/htdocs/index.php << 'PHPEOF'
          <?php
          use Illuminate\Http\Request;
          define('LARAVEL_START', microtime(true));
          if (file_exists($maintenance = __DIR__.'/../laravel/storage/framework/maintenance.php')) {
              require $maintenance;
          }
          require __DIR__.'/../laravel/vendor/autoload.php';
          $app = require_once __DIR__.'/../laravel/bootstrap/app.php';
          $app->handleRequest(Request::capture());
          PHPEOF

      - name: Upload via FTP to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: deploy/
          server-dir: /
          dangerous-clean-slate: true
