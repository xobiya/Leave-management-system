name: Deploy to InfinityFree

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        type: choice
        options:
          - production
          - staging
        default: production
      run_migrations:
        description: 'Run database migrations'
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: '8.4'
  NODE_VERSION: '20'
  APP_NAME: 'XobiyaHR'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, pdo_mysql, bcmath
          tools: composer:v2
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci
          npm run build

      - name: Create .env
        run: echo "${{ secrets.PROD_ENV_FILE }}" > .env

      - name: Prepare deployment
        run: |
          mkdir -p build/htdocs build/core
          cp -r public/* build/htdocs/
          rsync -av . build/core --exclude public --exclude .git --exclude .github --exclude node_modules --exclude tests
          mkdir -p build/core/storage/framework/{sessions,views,cache}
          mkdir -p build/core/storage/logs
          mkdir -p build/core/bootstrap/cache
          chmod -R 775 build/core/storage build/core/bootstrap/cache

          cat > build/htdocs/index.php << 'EOF'
          <?php
          define('LARAVEL_START', microtime(true));
          require __DIR__.'/../core/vendor/autoload.php';
          $app = require_once __DIR__.'/../core/bootstrap/app.php';
          $kernel = $app->make(Illuminate\Contracts\Http\Kernel::class);
          $response = $kernel->handle($request = Illuminate\Http\Request::capture())->send();
          $kernel->terminate($request, $response);

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: build/
          dangerous-clean-slate: false
